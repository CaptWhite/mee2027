name: CI/CD Pipeline - Astro Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: captwhite
  IMAGE_NAME: captwhite/mee2027

jobs:
  ci_build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: ci_build
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📤 Sync docker-compose.yml file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose-prod.yml
          target: /home/${{ secrets.SSH_USER }}/workspaces/mee2027/

      - name: 🚀 Deploy containers and restart service
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Conexión SSH establecida, iniciando despliegue."
            cd /home/${{ secrets.SSH_USER }}/workspaces/mee2027

            echo "Actualizando y reiniciando contenedores..."
            docker compose pull
            docker compose --file docker-compose-prod.yml down
            docker compose --file docker-compose-prod.yml up -d
            echo "✅ Despliegue de contenedores finalizado y levantado."
